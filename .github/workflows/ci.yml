name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The caller job id is the middle segment of every reusable-workflow status
  # check name (`CI / swift / build`).
  swift:
    uses: agoodkind/swift-makefile/.github/workflows/_ci.yml@main
    with:
      # gate (lint/audit/deadcode) runs in the reusable workflow's mandatory gate job.
      targets: '["build","test"]'
      fetch-depth: "0"
      # The privileged LaunchDaemon helper requires a real Developer ID
      # signature to register via SMAppService, so CI signs like release does.
      import-signing-cert: true
      signing-identity-name: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
      apple-team-id: H3BMXM4W7H
    secrets: inherit
